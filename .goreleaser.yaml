version: 2

project_name: rmesh

builds:
  - id: rmesh
    binary: rmesh
    main: ./cmd/rmesh
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - "7"
    ignore:
      - goos: darwin
        goarch: arm
      - goos: windows
        goarch: arm64
      - goos: windows
        goarch: arm
      - goos: linux
        goarch: arm
        goarm: 6
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ with .Arm }}v{{ . }}{{ end }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

homebrew_casks:
  - name: rmesh
    ids:
      - default
    binaries:
      - rmesh
    description: Command-line tool for RelayMesh
    homepage: https://github.com/relaymonkey/rmesh-cli
    caveats: |
      Shell tab completion (optional):

        eval "$(rmesh completion zsh)"

      Dynamic completion requires rmesh auth login.
    generate_completions_from_executable:
      executable: rmesh
      args:
        - completion
      shell_parameter_format: cobra
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/rmesh"]
          end
    repository:
      owner: relaymonkey
      name: homebrew-tap
      token: "{{ .Env.GITHUB_TOKEN }}"
    commit_author:
      name: relaymonkey-bot[bot]
      email: 991716+relaymonkey-bot[bot]@users.noreply.github.com
