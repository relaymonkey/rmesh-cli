version: 2

project_name: rmesh

builds:
  # Darwin needs CGO + the macOS SDK because the BLE transport pulls in
  # github.com/tinygo-org/cbgo (CoreBluetooth bindings). Built natively on
  # the macOS runner.
  - id: rmesh-darwin
    binary: rmesh
    main: ./cmd/rmesh
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

  # Linux and Windows cross-compile cleanly with CGO disabled — the BLE
  # backends on those platforms are pure Go (godbus on linux, winrt-go on
  # windows), so they build from any runner.
  - id: rmesh-cross
    binary: rmesh
    main: ./cmd/rmesh
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - "7"
    ignore:
      - goos: windows
        goarch: arm64
      - goos: windows
        goarch: arm
      - goos: linux
        goarch: arm
        goarm: 6
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: default
    ids:
      - rmesh-darwin
      - rmesh-cross
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ with .Arm }}v{{ . }}{{ end }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

homebrew_casks:
  - name: rmesh
    ids:
      - default
    binaries:
      - rmesh
    description: Command-line tool for RelayMesh
    homepage: https://github.com/relaymonkey/rmesh-cli
    caveats: |
      Shell tab completion (optional):

        eval "$(rmesh completion zsh)"

      Dynamic completion requires rmesh auth login.
    generate_completions_from_executable:
      executable: rmesh
      shell_parameter_format: cobra
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/rmesh"]
          end
    repository:
      owner: relaymonkey
      name: homebrew-tap
      token: "{{ .Env.GITHUB_TOKEN }}"
    commit_author:
      name: relaymonkey-bot[bot]
      email: 991716+relaymonkey-bot[bot]@users.noreply.github.com
