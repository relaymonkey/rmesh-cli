name: ci

on:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go mod tidy
      - name: verify go.mod / go.sum are tidy
        run: git diff --exit-code go.mod go.sum
      - run: go build -o /dev/null ./...
      - run: go test ./...
